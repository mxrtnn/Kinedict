<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión | KINEDICT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { kineDark: '#166534', kineLime: '#a3e635', kineBg: '#f0fdf4' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body class="bg-slate-900 text-slate-800 dark:text-slate-200 font-sans transition-colors duration-300 flex flex-col min-h-screen relative">

    <div id="loading-spinner" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex flex-col items-center justify-center hidden">
        <div class="w-16 h-16 border-4 border-kineLime border-t-transparent rounded-full animate-spin mb-6 shadow-[0_0_15px_rgba(163,230,53,0.5)]"></div>
        <h2 class="text-3xl font-black text-white tracking-widest">CARGANDO...</h2>
        <p class="text-kineLime text-sm mt-2 font-semibold tracking-wider">Preparando tu entorno seguro</p>
    </div>

    <nav class="absolute top-0 left-0 w-full z-50 p-4 md:px-8 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-3 mt-2 pointer-events-auto">
            <div class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-800 border border-white/10 shadow-lg">
                <i class="fa-solid fa-person-running text-2xl text-kineLime"></i>
            </div>
            <span class="text-2xl font-black text-kineLime tracking-tight drop-shadow-md hidden sm:block">KINEDICT</span>
        </div>

        <div class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 rounded-[2rem] p-2 flex gap-2 shadow-2xl mt-2 relative pointer-events-auto">
            <a href="index.html" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-house text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Inicio</span></a>
            <a href="perfil.html" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Perfil</span></a>
            <a href="evaluacion.html" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-clipboard-check text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Tests</span></a>
            <a href="#" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Historial</span></a>
            <a href="#" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-gear text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Ajustes</span></a>
        </div>

        <div class="flex gap-4 mt-2 pointer-events-auto">
            <div class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 p-2 rounded-2xl flex flex-col justify-center items-center gap-2 shadow-2xl">
                <button id="lang-toggle" class="text-white/50 hover:text-white transition" aria-label="Cambiar Idioma"><i class="fa-solid fa-globe"></i></button>
                <button id="theme-toggle" class="text-white/50 hover:text-white transition" aria-label="Cambiar Tema"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
            </div>
            <div id="auth-container" class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 p-4 py-3 rounded-2xl flex flex-col items-center justify-center shadow-2xl min-w-[140px] min-h-[90px]"></div>
        </div>
    </nav>

    <main class="flex-grow relative flex items-center justify-center p-4 pt-40 pb-12">
        <div class="absolute inset-0 bg-cover bg-center bg-no-repeat fixed" style="background-image: url('https://images.unsplash.com/photo-1511497584788-876760111969?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');"></div>
        <div class="absolute inset-0 bg-kineDark/50 mix-blend-multiply fixed"></div>
        <div class="absolute inset-0 bg-gradient-to-b from-kineDark/20 to-slate-900/90 fixed"></div>

        <div class="relative z-10 w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 sm:p-10 shadow-[0_8px_32px_0_rgba(0,0,0,0.37)] text-white">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold tracking-tight mb-2">Bienvenido de vuelta</h1>
                <p class="text-white/70 text-sm">Ingresa tus credenciales para continuar</p>
            </div>

            <form id="auth-form" class="space-y-6">
                <div class="relative">
                    <i class="fa-regular fa-envelope absolute left-0 top-3 text-white/60"></i>
                    <input type="email" placeholder="Correo Electrónico" class="w-full bg-transparent border-0 border-b border-white/30 text-white placeholder-white/60 pl-8 pr-4 py-2 focus:ring-0 focus:border-kineLime focus:outline-none transition-colors" required>
                </div>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-0 top-3 text-white/60"></i>
                    <input type="password" placeholder="Contraseña" class="w-full bg-transparent border-0 border-b border-white/30 text-white placeholder-white/60 pl-8 pr-4 py-2 focus:ring-0 focus:border-kineLime focus:outline-none transition-colors" required>
                </div>
                <div class="flex items-center justify-between text-sm text-white/80">
                    <label class="flex items-center gap-2 cursor-pointer hover:text-white transition">
                        <input type="checkbox" class="rounded border-white/30 bg-white/10 text-kineLime focus:ring-kineLime focus:ring-offset-0"> Recordarme
                    </label>
                    <a href="#" class="hover:text-kineLime transition">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="w-full bg-kineLime hover:bg-[#8ece28] text-slate-900 font-bold py-3 rounded-full shadow-lg transition-all transform hover:-translate-y-0.5 mt-4">
                    Iniciar Sesión
                </button>
            </form>

            <div class="mt-8 mb-6 flex items-center justify-center space-x-4 text-sm text-white/60">
                <span class="h-px w-full bg-white/20"></span><span class="whitespace-nowrap">O continúa con</span><span class="h-px w-full bg-white/20"></span>
            </div>

            <div class="flex gap-4 justify-center mb-8">
                <button class="w-12 h-12 rounded-full border border-white/30 bg-white/5 hover:bg-white/20 flex items-center justify-center transition-colors"><i class="fa-brands fa-google text-lg"></i></button>
                <button class="w-12 h-12 rounded-full border border-white/30 bg-white/5 hover:bg-white/20 flex items-center justify-center transition-colors"><i class="fa-brands fa-apple text-xl"></i></button>
                <button class="w-12 h-12 rounded-full border border-white/30 bg-white/5 hover:bg-white/20 flex items-center justify-center transition-colors"><i class="fa-brands fa-facebook-f text-lg"></i></button>
            </div>
            <p class="text-center text-sm text-white/70">
                ¿No tienes una cuenta? <a href="registro.html" class="text-kineLime hover:underline font-semibold ml-1">Regístrate aquí</a>
            </p>
        </div>
    </main>

    <script src="static/script.js"></script>
</body>
</html>
