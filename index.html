<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio | KINEDICT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { kineDark: '#166534', kineLime: '#a3e635', kineBg: '#f0fdf4' } } } }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body class="bg-white dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans transition-colors duration-300 relative">

    <nav class="absolute top-0 left-0 w-full z-50 p-4 md:px-8 flex justify-between items-start pointer-events-none">
        <div class="flex items-center gap-3 mt-2 pointer-events-auto">
            <div class="w-10 h-10 rounded-full flex items-center justify-center bg-slate-800 border border-white/10 shadow-lg">
                <i class="fa-solid fa-person-running text-2xl text-kineLime"></i>
            </div>
            <span class="text-2xl font-black text-kineLime tracking-tight drop-shadow-md hidden sm:block">KINEDICT</span>
        </div>

        <div class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 rounded-[2rem] p-2 flex gap-2 shadow-2xl mt-2 relative pointer-events-auto">
            <div class="relative flex flex-col items-center justify-center w-16 h-16 cursor-default">
                <div class="absolute -top-4 w-14 h-14 bg-kineLime rounded-2xl shadow-[0_8px_15px_rgba(163,230,53,0.4)] flex items-center justify-center">
                    <i class="fa-solid fa-house text-slate-900 text-2xl"></i>
                </div>
                <span class="absolute bottom-1 text-[10px] uppercase font-bold tracking-wider text-kineLime">Inicio</span>
            </div>
            
            <a href="perfil.html" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-user text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Perfil</span></a>
            <a href="evaluacion.html" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-clipboard-check text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Tests</span></a>
            <a href="#" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-clock-rotate-left text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Historial</span></a>
            <a href="#" class="flex flex-col items-center justify-center w-16 h-16 text-white/50 hover:text-white transition-colors"><i class="fa-solid fa-gear text-xl mb-1"></i><span class="text-[10px] uppercase font-bold tracking-wider">Ajustes</span></a>
        </div>

        <div class="flex gap-4 mt-2 pointer-events-auto">
            <div class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 p-2 rounded-2xl flex flex-col justify-center items-center gap-2 shadow-2xl">
                <button id="lang-toggle" class="text-white/50 hover:text-white transition"><i class="fa-solid fa-globe"></i></button>
                <button id="theme-toggle" class="text-white/50 hover:text-white transition"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
            </div>
            <div id="auth-container" class="bg-[#1e2329]/95 backdrop-blur-md border border-white/5 p-4 py-3 rounded-2xl flex flex-col items-center justify-center shadow-2xl min-w-[140px] min-h-[90px]"></div>
        </div>
    </nav>

    <header class="bg-kineBg dark:bg-slate-800 pt-40 pb-20 transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid md:grid-cols-2 gap-12 items-center">
            
            <div>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 dark:text-white mb-6 leading-tight">
                    Plataforma de examen preventivo para deportistas
                </h1>
                <p class="text-lg text-slate-600 dark:text-slate-300 mb-10 leading-relaxed">
                    Kinedict ayuda a realizar exámenes de predicción de índice lesivo para distintos estilos de vida.
                </p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="evaluacion.html" class="bg-kineLime text-slate-900 px-8 py-3 rounded-md text-base font-bold text-center shadow hover:opacity-90 transition">
                        Pruébalo &rarr;
                    </a>
                </div>
            </div>

            <div class="relative w-full flex justify-center items-center h-[450px]">
                
                <div class="absolute w-[350px] md:w-[400px] h-[350px] md:h-[400px] border border-dashed border-kineLime/30 rounded-full orbit-container flex items-center justify-center z-0">
                    
                    <div class="absolute -top-6 orbit-icon bg-slate-800 border border-kineLime text-kineLime w-14 h-14 flex items-center justify-center rounded-full shadow-[0_0_15px_rgba(163,230,53,0.4)] text-xl">
                        <i class="fa-solid fa-dumbbell"></i>
                    </div>
                    
                    <div class="absolute -bottom-6 orbit-icon bg-slate-800 border border-kineLime text-kineLime w-14 h-14 flex items-center justify-center rounded-full shadow-[0_0_15px_rgba(163,230,53,0.4)] text-xl">
                        <i class="fa-solid fa-weight-hanging"></i>
                    </div>
                    
                    <div class="absolute -left-6 orbit-icon bg-slate-800 border border-kineLime text-kineLime w-14 h-14 flex items-center justify-center rounded-full shadow-[0_0_15px_rgba(163,230,53,0.4)] text-xl">
                        <i class="fa-solid fa-heart-pulse"></i>
                    </div>
                    
                    <div class="absolute -right-6 orbit-icon bg-slate-800 border border-kineLime text-kineLime w-14 h-14 flex items-center justify-center rounded-full shadow-[0_0_15px_rgba(163,230,53,0.4)] text-xl">
                        <i class="fa-solid fa-stopwatch"></i>
                    </div>

                </div>

                <div class="relative z-10 rounded-full overflow-hidden shadow-[0_0_40px_rgba(0,0,0,0.6)] w-64 h-64 md:w-72 md:h-72 border-4 border-slate-800">
                    <img src="/assets/lesion3.jpg" alt="Evaluación Kinedict" class="w-full h-full object-cover hover:scale-110 transition-transform duration-700">
                </div>
                
            </div>
            </div>
    </header>

    <script src="static/script.js"></script>
</body>
</html>
